<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מסע טרנס-וורבלי · בית הרמזים</title>
<link rel="preload" as="image" href="img/entry-slit.jpg" fetchpriority="high">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet">

<style>
/* ── CONCEPT C: FILM TITLE CARD ──────────────────────── */
/* All tokens derived from concept: cinema. Zero HOC CSS. */

:root {
  --ink:    #FFFFFF;
  --copper: #B8916A;
  --meta:   rgba(255,255,255,.38);
  --bg:     #080806;
  --display: "Cormorant Garant", Georgia, serif;
  --sans:    system-ui, -apple-system, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

/* ── POSTER FRAME ────────────────────────────────────── */
.poster {
  position: fixed; inset: 0;
  display: grid;
  place-items: end start;
}

/* ── HERO IMAGE ──────────────────────────────────────── */
.poster-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  opacity: .72;
}

/* Cinema lens — dark frame, glow at center */
.lens {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 65% 55% at 50% 38%,
      transparent 0%,
      rgba(8,8,6,.2) 50%,
      rgba(8,8,6,.78) 100%),
    linear-gradient(180deg,
      rgba(8,8,6,.08) 0%,
      transparent 28%,
      rgba(8,8,6,.92) 100%);
}

/* ── TEXT — bottom-left (breaks RTL default = art direction) */
.title-block {
  position: relative; z-index: 2;
  padding: 0 7vw 7vh;
  text-align: left;
  direction: ltr;
}
.title-block * { unicode-bidi: plaintext; }

.eyebrow {
  font-family: var(--sans);
  font-size: clamp(10px, 1vw, 12px);
  letter-spacing: .4em;
  color: var(--copper);
  margin-bottom: 2.2vh;
  font-weight: 400;
}

h1 {
  font-family: var(--display);
  font-weight: 300;
  font-style: italic;
  font-size: clamp(60px, 10vw, 136px);
  line-height: .9;
  letter-spacing: -.01em;
  color: var(--ink);
  margin-bottom: 3vh;
}

.tagline {
  font-family: var(--display);
  font-size: clamp(15px, 1.7vw, 21px);
  color: var(--meta);
  font-style: italic;
  font-weight: 300;
  margin-bottom: 4vh;
  max-width: 42ch;
  line-height: 1.55;
}

.meta-row {
  display: flex; gap: 26px;
  font-family: var(--sans);
  font-size: clamp(9px, .9vw, 11px);
  letter-spacing: .22em;
  color: var(--meta);
  margin-bottom: 4vh;
  flex-wrap: wrap;
}

.cta {
  display: inline-block;
  font-family: var(--display);
  font-size: clamp(14px, 1.4vw, 17px);
  font-style: italic;
  letter-spacing: .22em;
  color: var(--copper);
  background: none;
  border: none; border-bottom: 1px solid rgba(184,145,106,.35);
  padding-bottom: 4px;
  cursor: pointer;
  transition: color .2s, border-color .2s;
}
.cta:hover { color: #fff; border-color: rgba(255,255,255,.35); }

/* ── MODAL ───────────────────────────────────────────── */
.modal-wrap {
  position: fixed; inset: 0; z-index: 99;
  background: rgba(8,8,6,.94);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .28s;
}
.modal-wrap.open { opacity: 1; pointer-events: auto; }

.modal {
  position: relative;
  max-width: 420px; width: calc(100% - 48px);
  padding: 52px 40px 44px;
  border: 1px solid rgba(184,145,106,.18);
  direction: rtl; text-align: right;
}

.modal-close {
  position: absolute; top: 18px; left: 18px;
  background: none; border: none;
  color: var(--meta); font-size: 24px;
  cursor: pointer; line-height: 1; padding: 6px;
  transition: color .18s;
}
.modal-close:hover { color: var(--ink); }

.modal h2 {
  font-family: var(--display);
  font-weight: 300; font-style: italic;
  font-size: clamp(28px, 4vw, 36px);
  line-height: 1.1;
  margin-bottom: 30px;
}

.tickets {
  display: flex; gap: 10px;
  margin-bottom: 24px;
}
.ticket {
  flex: 1; padding: 18px 12px; text-align: center;
  border: 1px solid rgba(184,145,106,.2);
  cursor: pointer;
  transition: border-color .18s;
}
.ticket.sel { border-color: var(--copper); }
.t-label {
  font-family: var(--sans); font-size: 10px;
  letter-spacing: .12em; color: var(--meta);
  margin-bottom: 8px;
}
.t-price {
  font-family: var(--display); font-style: italic;
  font-size: 28px; color: var(--copper);
}

.total {
  font-family: var(--sans); font-size: 13px;
  color: var(--meta); margin-bottom: 22px;
}
.total b {
  font-family: var(--display); font-style: italic;
  font-size: 26px; color: var(--ink);
}

.btn-book {
  display: block; width: 100%;
  padding: 16px;
  font-family: var(--display); font-style: italic;
  font-size: 19px; letter-spacing: .04em;
  color: var(--bg); background: var(--copper);
  border: none; cursor: pointer;
  transition: background .18s;
}
.btn-book:hover { background: #cba07e; }

/* ── MOBILE ──────────────────────────────────────────── */
@media (max-width: 580px) {
  .poster { place-items: end center; }
  .title-block {
    padding: 0 6vw 9vh;
    text-align: center; direction: rtl;
  }
  .meta-row { justify-content: center; }
  h1 { font-size: clamp(52px, 14vw, 86px); line-height: .95; }
}

/* preview flag */
.flag {
  position: fixed; bottom: 18px; right: 18px; z-index: 10;
  font-family: var(--sans); font-size: 10px;
  letter-spacing: .2em; color: rgba(255,255,255,.2);
}
</style>
</head>
<body>

<div class="poster">
  <img class="poster-img" src="img/entry-slit.jpg" alt="">
  <div class="lens"></div>

  <div class="title-block">
    <div class="eyebrow">בית הרמזים · נמל יפו · 2026</div>
    <h1>מסע<br>טרנס-וורבלי</h1>
    <div class="tagline">מוזיקת טראנס שכוסחת את הקשב.<br>כיפת 360° שמסלקת את ה״מחוץ״.<br>מה שמגיע אחרי — אינו קטגוריה.</div>
    <div class="meta-row">
      <span>שעתיים</span>
      <span>קבוצה של 10</span>
      <span>מ-₪252</span>
    </div>
    <button class="cta" onclick="openModal()">הזמן מקום ←</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-wrap" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>בחר כרטיס</h2>
    <div class="tickets">
      <div class="ticket sel" onclick="selTicket(this,252)">
        <div class="t-label">יחיד</div>
        <div class="t-price">₪252</div>
      </div>
      <div class="ticket" onclick="selTicket(this,444)">
        <div class="t-label">זוגי</div>
        <div class="t-price">₪444</div>
      </div>
    </div>
    <div class="total">סה״כ: <b id="tot">₪252</b></div>
    <button class="btn-book">כנס</button>
  </div>
</div>

<div class="flag">PREVIEW · POSTER CONCEPT</div>

<script>
function openModal()  { document.getElementById('modal').classList.add('open');    }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function selTicket(el, price) {
  document.querySelectorAll('.ticket').forEach(t => t.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('tot').textContent = '₪' + price;
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
</script>
</body>
</html>
